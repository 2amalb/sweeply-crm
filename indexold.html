<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweeply CRM — команда</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="%23FF5430"/><stop offset="1" stop-color="%23FFA01E"/></linearGradient></defs><g fill="url(%23g)"><circle cx="50" cy="24" r="22"/><circle cx="74" cy="42" r="22"/><circle cx="65" cy="71" r="22"/><circle cx="35" cy="71" r="22"/><circle cx="26" cy="42" r="22"/><circle cx="50" cy="48" r="26"/></g><path d="M50 33 L66 46 L66 64 L34 64 L34 46 Z" fill="white"/></svg>'>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#221610; --muted:#8C7C70; --orange:#E8541F;
    --border:#F0E4DA; --tint:#FCF9F6; --tint2:#F5F1ED;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--ink); background:#fff;}
  .wrap{max-width:980px; margin:0 auto; padding:24px 16px 60px;}

  .head{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:20px; flex-wrap:wrap;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand h1{font-size:18px; line-height:1.2;}
  .brand .sub{font-size:12px; color:var(--muted);}
  .btn{border:none; cursor:pointer; font:inherit; font-size:14px; font-weight:600; border-radius:12px; padding:9px 16px;}
  .btn-primary{color:#fff; background:linear-gradient(135deg,#FF5430,#FFA01E);}
  .btn-ghost{background:var(--tint2); color:var(--ink);}
  .btn-sm{font-size:12px; padding:6px 10px; border-radius:9px;}
  .btn:disabled{opacity:.4; cursor:default;}

  .funnel{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;}
  .chip{border:1px solid var(--border); background:#fff; border-radius:999px; padding:6px 12px; font-size:12px; font-weight:600; cursor:pointer;}
  .chip .n{opacity:.65;}
  .chip.active{border-color:currentColor;}

  .controls{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .search{flex:1; min-width:220px; padding:11px 14px; border-radius:12px; border:1px solid var(--border); background:var(--tint); font:inherit; font-size:14px; outline:none;}
  .authorsel{padding:11px 14px; border-radius:12px; border:1px solid var(--border); background:var(--tint); font:inherit; font-size:13px; outline:none; color:var(--ink);}

  .empty{text-align:center; padding:60px 20px; background:var(--tint); border-radius:16px; color:var(--muted); font-size:14px;}
  .empty svg{opacity:.55; margin-bottom:10px;}

  .card{border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:10px; background:#fff;}
  .card.overdue{border-color:#EFC4BE; background:#FFFAF9;}
  .card .top{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;}
  .card .name{font-weight:700; font-size:16px;}
  .badge{font-size:11px; font-weight:600; padding:2px 9px; border-radius:999px; vertical-align:2px; margin-left:8px;}
  .author{font-size:11px; font-weight:600; color:#7A6356; background:var(--tint2); padding:2px 9px; border-radius:999px; vertical-align:2px; margin-left:6px;}
  .meta{font-size:13px; color:var(--muted); margin-top:5px;}
  .meta span{margin-right:12px; white-space:nowrap;}
  .next{font-size:13px; margin-top:7px; font-weight:600;}
  .next .date{font-weight:400; color:var(--muted); margin-left:8px;}
  .next.overdue, .next.overdue .date{color:#A3433A;}
  .next.today{color:var(--orange);}
  .notes{font-size:12px; color:var(--muted); margin-top:7px; white-space:pre-wrap;}
  .actions{display:flex; gap:6px; align-items:flex-start; flex-shrink:0;}

  .modal-bg{position:fixed; inset:0; background:rgba(34,22,16,.45); display:flex; align-items:flex-end; justify-content:center; z-index:50;}
  @media(min-width:640px){ .modal-bg{align-items:center; padding:16px;} }
  .modal{background:#fff; width:100%; max-width:520px; border-radius:20px 20px 0 0; padding:22px; max-height:92vh; overflow-y:auto;}
  @media(min-width:640px){ .modal{border-radius:20px;} }
  .modal h2{font-size:17px; margin-bottom:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-bottom:4px;}
  .field input,.field select,.field textarea{width:100%; padding:9px 12px; border-radius:12px; border:1px solid var(--border); background:var(--tint); font:inherit; font-size:14px; outline:none; color:var(--ink);}
  .field textarea{min-height:70px; resize:vertical;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .modal .foot{display:flex; gap:8px; margin-top:16px;}
  .modal .foot .btn-primary{flex:1;}

  /* login */
  .login{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-card{width:100%; max-width:360px;}
  .login-card .logo{display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:24px;}
  .login-card h1{font-size:20px;}
  .err{color:#A3433A; font-size:12.5px; margin-top:10px; min-height:16px;}

  .toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-top:28px; padding-top:16px; border-top:1px solid var(--border); align-items:center;}
  .toolbar .hint{font-size:11.5px; color:var(--muted); flex-basis:100%;}
  .userbox{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--muted);}
  .userbox b{color:var(--ink);}
  .rolebadge{font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px;}
  .role-admin{color:#E8541F; background:#FFE9DD;}
  .role-manager{color:#8C7C70; background:#F5F1ED;}
  #loading{position:fixed; inset:0; background:#fff; display:flex; align-items:center; justify-content:center; z-index:100; color:var(--muted); font-size:14px; gap:10px;}
  .cfgwarn{max-width:560px; margin:80px auto; padding:24px; border:1px solid #EFC4BE; background:#FFFAF9; border-radius:16px; font-size:14px; line-height:1.5;}
  .cfgwarn code{background:#F5F1ED; padding:1px 6px; border-radius:6px; font-size:13px;}
</style>
</head>
<body>

<!-- ===== НАСТРОЙКА: вставьте свои ключи из Supabase (Settings → API) ===== -->
<script>
  const SUPABASE_URL = "https://gnpjgplcmxhfgnjfohpu.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_rS9CYIpyLI8YfspBgDeogQ_qzLc8anO";
</script>
<!-- ======================================================================= -->

<div id="loading">
  <svg width="28" height="28" viewBox="0 0 100 100"><g fill="#E8541F"><circle cx="50" cy="24" r="22"/><circle cx="74" cy="42" r="22"/><circle cx="65" cy="71" r="22"/><circle cx="35" cy="71" r="22"/><circle cx="26" cy="42" r="22"/><circle cx="50" cy="48" r="26"/></g><path d="M50 33 L66 46 L66 64 L34 64 L34 46 Z" fill="#fff"/></svg>
  Загрузка…
</div>

<div id="app"></div>

<script>
const FLOWER = (s=30) => `<svg width="${s}" height="${s}" viewBox="0 0 100 100"><defs><linearGradient id="g${s}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF5430"/><stop offset="1" stop-color="#FFA01E"/></linearGradient></defs><g fill="url(#g${s})"><circle cx="50" cy="24" r="22"/><circle cx="74" cy="42" r="22"/><circle cx="65" cy="71" r="22"/><circle cx="35" cy="71" r="22"/><circle cx="26" cy="42" r="22"/><circle cx="50" cy="48" r="26"/></g><path d="M50 33 L66 46 L66 64 L34 64 L34 46 Z" fill="#fff"/></svg>`;

const STATUSES = [
  {id:"new",     label:"Новая",                color:"#8C7C70", bg:"#F5F1ED"},
  {id:"called",  label:"Звонок сделан",        color:"#B07A1E", bg:"#FCF3E0"},
  {id:"sent",    label:"Материалы отправлены", color:"#C2641B", bg:"#FDEEDF"},
  {id:"meeting", label:"Встреча назначена",    color:"#E8541F", bg:"#FFE9DD"},
  {id:"pilot",   label:"Пилот",                color:"#C2410C", bg:"#FFE2CF"},
  {id:"partner", label:"Партнёр",              color:"#1E9D63", bg:"#E2F4EB"},
  {id:"lost",    label:"Отказ",                color:"#A3433A", bg:"#F8E7E5"},
];
const ORDER = ["new","called","sent","meeting","pilot","partner"];

let sb = null;
let me = null;            // {id, email}
let myProfile = null;     // {name, role}
let companies = [];
let filter = "all";
let authorFilter = "all";
let editId = null;
let confirmDeleteId = null;

const $ = id => document.getElementById(id);
const esc = s => String(s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const todayStr = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const fmtDate = s => { if(!s) return ""; const [y,m,d]=s.split("-"); return d+"."+m+"."+y.slice(2); };
const stOf = id => STATUSES.find(s=>s.id===id) || STATUSES[0];
const isOverdue = c => c.next_date && c.next_date < todayStr() && c.status!=="partner" && c.status!=="lost";
const isAdmin = () => myProfile && myProfile.role === "admin";

// ---------- bootstrap ----------
(async function init(){
  if(SUPABASE_URL.startsWith("ВСТАВЬТЕ") || SUPABASE_ANON_KEY.startsWith("ВСТАВЬТЕ")){
    $("loading").style.display = "none";
    $("app").innerHTML = `<div class="cfgwarn"><b>Осталось подключить базу.</b><br><br>
      Откройте этот файл в текстовом редакторе и в самом верху, в блоке «НАСТРОЙКА», замените две строки на ваши значения из Supabase
      (Project Settings → API): <code>Project URL</code> и ключ <code>anon public</code>. Сохраните и обновите страницу.</div>`;
    return;
  }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data: { session } } = await sb.auth.getSession();
  $("loading").style.display = "none";
  if(session){ me = session.user; await afterLogin(); }
  else renderLogin();
})();

function renderLogin(msg=""){
  $("app").innerHTML = `
  <div class="login"><div class="login-card">
    <div class="logo">${FLOWER(36)}<h1>sweeply · CRM</h1></div>
    <div class="field"><label>Email</label><input id="l_email" type="email" autocomplete="username"></div>
    <div class="field"><label>Пароль</label><input id="l_pass" type="password" autocomplete="current-password"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Войти</button>
    <div class="err" id="l_err">${esc(msg)}</div>
    <div style="font-size:11.5px;color:var(--muted);margin-top:14px;text-align:center">Аккаунты создаёт администратор.<br>Нет доступа — обратитесь к руководителю.</div>
  </div></div>`;
  $("l_pass").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
}

async function doLogin(){
  $("l_err").textContent = "";
  const { error } = await sb.auth.signInWithPassword({ email: $("l_email").value.trim(), password: $("l_pass").value });
  if(error){ $("l_err").textContent = "Неверный email или пароль."; return; }
  const { data: { session } } = await sb.auth.getSession();
  me = session.user;
  await afterLogin();
}

async function doLogout(){
  await sb.auth.signOut();
  me = null; myProfile = null; companies = [];
  renderLogin();
}

async function afterLogin(){
  const { data: prof } = await sb.from("profiles").select("name, role").eq("id", me.id).single();
  myProfile = prof || { name: me.email.split("@")[0], role: "manager" };
  await fetchCompanies();
  renderApp();
}

async function fetchCompanies(){
  const { data, error } = await sb.from("companies").select("*").order("created_at", { ascending: false });
  if(!error) companies = data || [];
}

// ---------- main UI ----------
function renderApp(){
  $("app").innerHTML = `
  <div class="wrap">
    <div class="head">
      <div class="brand">
        ${FLOWER(34)}
        <div>
          <h1>sweeply · CRM</h1>
          <div class="sub">общая база команды · обновлена ${new Date().toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"})}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="userbox">
          <b>${esc(myProfile.name)}</b>
          <span class="rolebadge ${isAdmin()?"role-admin":"role-manager"}">${isAdmin()?"админ":"менеджер"}</span>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="refresh()" title="Обновить базу">⟳</button>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">Выйти</button>
        <button class="btn btn-primary" onclick="openAdd()">+ Компания</button>
      </div>
    </div>
    <div class="funnel" id="funnel"></div>
    <div class="controls">
      <input class="search" id="search" placeholder="Поиск: компания, ЛПР, телефон, заметки…" oninput="renderList()">
      <select class="authorsel" id="authorsel" onchange="authorFilter=this.value;renderList()"></select>
    </div>
    <div id="list"></div>
    <div class="toolbar">
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📊 Экспорт в Excel (CSV)</button>
      <div class="hint">База общая для всей команды и хранится в Supabase. У каждой записи виден автор${isAdmin()?"; как админ вы можете удалять любые записи и управлять пользователями в панели Supabase":""}.</div>
    </div>
  </div>
  <div class="modal-bg" id="modalBg" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h2 id="modalTitle">Новая компания</h2>
      <div class="field"><label>Компания *</label><input id="f_name" placeholder="Например: ChistoDom"></div>
      <div class="row2">
        <div class="field"><label>ЛПР (имя, роль)</label><input id="f_person" placeholder="Азиз, директор"></div>
        <div class="field"><label>Уборщиц в штате</label><input id="f_cleaners" placeholder="≈ 15"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Телефон</label><input id="f_phone" placeholder="+998 …"></div>
        <div class="field"><label>Telegram</label><input id="f_telegram" placeholder="@…"></div>
      </div>
      <div class="field"><label>Статус</label><select id="f_status">${STATUSES.map(s=>`<option value="${s.id}">${s.label}</option>`).join("")}</select></div>
      <div class="row2">
        <div class="field"><label>Следующий шаг</label><input id="f_nextAction" placeholder="Перезвонить после деки"></div>
        <div class="field"><label>Дата шага</label><input id="f_nextDate" type="date"></div>
      </div>
      <div class="field"><label>Заметки</label><textarea id="f_notes" placeholder="Возражения, договорённости, впечатление от звонка…"></textarea></div>
      <div class="foot">
        <button class="btn btn-primary" id="saveBtn" onclick="saveForm()">Сохранить</button>
        <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      </div>
    </div>
  </div>`;
  renderList();
}

async function refresh(){ await fetchCompanies(); renderApp(); }

function renderList(){
  const today = todayStr();
  const q = ($("search").value||"").trim().toLowerCase();

  // funnel
  const counts = {all: companies.length, overdue: companies.filter(isOverdue).length};
  STATUSES.forEach(s => counts[s.id] = companies.filter(c=>c.status===s.id).length);
  let fh = chip("all","Все",counts.all,"#221610","#F5F1ED");
  if(counts.overdue>0) fh += chip("overdue","🔥 Просрочено",counts.overdue,"#A3433A","#F8E7E5");
  STATUSES.forEach(s => fh += chip(s.id,s.label,counts[s.id],s.color,s.bg));
  $("funnel").innerHTML = fh;

  // author filter options
  const authors = [...new Set(companies.map(c=>c.author_name).filter(Boolean))].sort();
  $("authorsel").innerHTML = `<option value="all">Автор: все</option>` +
    authors.map(a=>`<option value="${esc(a)}" ${authorFilter===a?"selected":""}>Автор: ${esc(a)}</option>`).join("");

  let list = [...companies];
  if(filter==="overdue") list = list.filter(isOverdue);
  else if(filter!=="all") list = list.filter(c=>c.status===filter);
  if(authorFilter!=="all") list = list.filter(c=>c.author_name===authorFilter);
  if(q) list = list.filter(c =>
    (c.name||"").toLowerCase().includes(q) || (c.person||"").toLowerCase().includes(q) ||
    (c.phone||"").includes(q) || (c.notes||"").toLowerCase().includes(q));
  list.sort((a,b)=>{
    const ao=isOverdue(a)?0:1, bo=isOverdue(b)?0:1;
    if(ao!==bo) return ao-bo;
    if(a.next_date&&b.next_date) return a.next_date.localeCompare(b.next_date);
    if(a.next_date) return -1; if(b.next_date) return 1;
    return (a.name||"").localeCompare(b.name||"");
  });

  if(list.length===0){
    $("list").innerHTML = `<div class="empty">${FLOWER(44)}<div>${companies.length===0 ? "База пустая. Добавьте первую компанию." : "Ничего не найдено по этому фильтру."}</div></div>`;
    return;
  }

  $("list").innerHTML = list.map(c=>{
    const st = stOf(c.status);
    const over = isOverdue(c);
    const isToday = c.next_date===today;
    const canAdvance = c.status!=="partner" && c.status!=="lost";
    const canDelete = isAdmin() || c.created_by === me.id;
    return `<div class="card ${over?"overdue":""}">
      <div class="top">
        <div style="min-width:0">
          <span class="name">${esc(c.name)}</span>
          <span class="badge" style="color:${st.color};background:${st.bg}">${st.label}</span>
          <span class="author" title="Кто добавил компанию">👤 ${esc(c.author_name||"—")}</span>
          ${c.cleaners?`<span style="font-size:12px;color:var(--muted);margin-left:8px">${esc(c.cleaners)} уборщиц</span>`:""}
          <div class="meta">
            ${c.person?`<span>👤 ${esc(c.person)}</span>`:""}
            ${c.phone?`<span>📞 ${esc(c.phone)}</span>`:""}
            ${c.telegram?`<span>✈️ ${esc(c.telegram)}</span>`:""}
          </div>
          ${(c.next_action||c.next_date)?`<div class="next ${over?"overdue":isToday?"today":""}">
            ${over?"🔥 ":isToday?"📌 ":"→ "}${esc(c.next_action||"Следующий шаг")}
            ${c.next_date?`<span class="date">${fmtDate(c.next_date)}${isToday?" (сегодня)":""}</span>`:""}
          </div>`:""}
          ${c.notes?`<div class="notes">${esc(c.notes)}</div>`:""}
        </div>
        <div class="actions">
          ${canAdvance?`<button class="btn btn-sm" style="color:#E8541F;background:#FFE9DD" onclick="advance('${c.id}')">этап →</button>`:""}
          ${c.status!=="lost"?`<button class="btn btn-sm" style="color:#A3433A;background:#F8E7E5" onclick="setStatus('${c.id}','lost')">✕</button>`:""}
          <button class="btn btn-ghost btn-sm" onclick="openEdit('${c.id}')">✎</button>
          ${canDelete ? (confirmDeleteId===c.id
            ?`<button class="btn btn-sm" style="color:#fff;background:#A3433A" onclick="removeCompany('${c.id}')">точно?</button>`
            :`<button class="btn btn-ghost btn-sm" style="color:var(--muted)" onclick="confirmDeleteId='${c.id}';renderList()">🗑</button>`) : ""}
        </div>
      </div>
    </div>`;
  }).join("");
}

function chip(id,label,count,color,bg){
  const active = filter===id;
  return `<button class="chip ${active?"active":""}" style="color:${color};${active?`background:${bg};`:""}" onclick="filter='${id}';confirmDeleteId=null;renderList()">${label} <span class="n">· ${count}</span></button>`;
}

// ---------- mutations ----------
async function advance(id){
  const c = companies.find(x=>x.id===id); if(!c) return;
  const i = ORDER.indexOf(c.status);
  if(i>-1 && i<ORDER.length-1){
    const next = ORDER[i+1];
    const { error } = await sb.from("companies").update({ status: next }).eq("id", id);
    if(!error){ c.status = next; renderList(); }
  }
}
async function setStatus(id, st){
  const { error } = await sb.from("companies").update({ status: st }).eq("id", id);
  if(!error){ const c=companies.find(x=>x.id===id); if(c) c.status=st; renderList(); }
}
async function removeCompany(id){
  const { error } = await sb.from("companies").delete().eq("id", id);
  confirmDeleteId = null;
  if(!error) companies = companies.filter(c=>c.id!==id);
  renderList();
}

// ---------- form ----------
function openAdd(){
  editId = null;
  $("modalTitle").textContent = "Новая компания";
  ["name","person","cleaners","phone","telegram","nextAction","notes"].forEach(f=>$("f_"+f).value="");
  $("f_status").value = "new";
  $("f_nextDate").value = todayStr();
  $("modalBg").style.display = "flex";
  $("f_name").focus();
}
function openEdit(id){
  const c = companies.find(x=>x.id===id); if(!c) return;
  editId = id;
  $("modalTitle").textContent = "Редактировать";
  $("f_name").value=c.name||""; $("f_person").value=c.person||""; $("f_cleaners").value=c.cleaners||"";
  $("f_phone").value=c.phone||""; $("f_telegram").value=c.telegram||"";
  $("f_status").value=c.status||"new"; $("f_nextAction").value=c.next_action||"";
  $("f_nextDate").value=c.next_date||""; $("f_notes").value=c.notes||"";
  $("modalBg").style.display = "flex";
}
function closeModal(){ $("modalBg").style.display="none"; }

async function saveForm(){
  const v = f => $("f_"+f).value.trim();
  if(!v("name")){ $("f_name").focus(); return; }
  $("saveBtn").disabled = true;
  const data = {
    name:v("name"), person:v("person"), cleaners:v("cleaners"),
    phone:v("phone"), telegram:v("telegram"),
    status:$("f_status").value, next_action:v("nextAction"),
    next_date: $("f_nextDate").value || null, notes:v("notes"),
  };
  let error;
  if(editId){
    ({ error } = await sb.from("companies").update(data).eq("id", editId));
    if(!error){ const c=companies.find(x=>x.id===editId); Object.assign(c, data); }
  } else {
    const row = { ...data, created_by: me.id, author_name: myProfile.name };
    const res = await sb.from("companies").insert(row).select().single();
    error = res.error;
    if(!error) companies.unshift(res.data);
  }
  $("saveBtn").disabled = false;
  if(error){ alert("Не удалось сохранить: " + error.message); return; }
  closeModal(); renderList();
}

// ---------- export ----------
function exportCSV(){
  const head = ["Компания","ЛПР","Телефон","Telegram","Уборщиц","Статус","Следующий шаг","Дата","Заметки","Автор","Добавлена"];
  const rows = companies.map(c=>[c.name,c.person,c.phone,c.telegram,c.cleaners,stOf(c.status).label,c.next_action,c.next_date||"",(c.notes||"").replace(/\n/g," "),c.author_name,(c.created_at||"").slice(0,10)]);
  const csv = "\uFEFF" + [head,...rows].map(r=>r.map(x=>`"${String(x||"").replace(/"/g,'""')}"`).join(";")).join("\r\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download = "sweeply-crm-"+todayStr()+".csv"; a.click(); URL.revokeObjectURL(a.href);
}

document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });
